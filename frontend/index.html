<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RooCode — Dashboard de Saúde</title>
    <script>
      (function () {
        try {
          var root = document.documentElement
          var theme = localStorage.getItem('roocode-theme')
          root.dataset.theme =
            theme === 'graphite' || theme === 'contrast' ? theme : 'clinical'
          root.dataset.density =
            localStorage.getItem('roocode-density') === 'compact' ? 'compact' : 'cozy'
          var motion = localStorage.getItem('roocode-reduced-motion')
          var reduced =
            motion === '1' ||
            (motion !== '0' &&
              window.matchMedia('(prefers-reduced-motion: reduce)').matches)
          root.dataset.motion = reduced ? 'reduced' : 'full'
        } catch (err) {
          document.documentElement.dataset.theme = 'clinical'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
